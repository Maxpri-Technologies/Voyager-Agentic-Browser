<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Controller</title>
  <style>
    :root {
      --bg-color: #121214;
      --panel-bg: #1a1a1e;
      --border-color: #2a2a30;
      --text-color: #e4e4e7;
      --text-muted: #a1a1aa;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --user-bubble: #27272a;
      --agent-bubble: #1e1b4b;
      --agent-accent: #818cf8;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    /* Header */
    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--panel-bg);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    /* Chat Messages Area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .message.user {
      background-color: var(--user-bubble);
      align-self: flex-end;
      color: var(--text-color);
      border-bottom-right-radius: 2px;
    }

    .message.agent {
      background-color: var(--agent-bubble);
      border: 1px solid rgba(129, 140, 248, 0.2);
      align-self: flex-start;
      color: #e0e7ff;
      border-bottom-left-radius: 2px;
    }

    .message.system {
      background-color: transparent;
      align-self: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      max-width: 100%;
      padding: 4px 8px;
      font-style: italic;
    }

    /* Input Footer */
    .footer {
      padding: 16px;
      background-color: var(--panel-bg);
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-color);
      padding: 10px;
      font-size: 0.9rem;
      resize: none;
      height: 50px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--primary);
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      outline: none;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:disabled {
      background-color: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Expandable logs dropdown matching UI theme */
    .logs-dropdown {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      overflow: hidden;
      font-size: 0.85rem;
    }

    .logs-summary {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      color: var(--text-color);
      cursor: pointer;
      user-select: none;
      font-weight: 500;
    }

    .logs-summary::-webkit-details-marker,
    .logs-summary::marker {
      display: none;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      background-color: var(--text-muted);
      border-radius: 50%;
      margin-right: 10px;
      transition: background-color 0.3s, box-shadow 0.3s;
    }

    .status-indicator.active {
      background-color: var(--primary);
      box-shadow: 0 0 8px var(--primary);
      animation: pulse 1.5s infinite ease-in-out;
    }

    .status-indicator.finished {
      background-color: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    #logs-status-text {
      flex-grow: 1;
    }

    .chevron {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }

    .logs-dropdown[open] .chevron {
      transform: rotate(180deg);
    }

    .logs-content {
      padding: 12px 16px;
      max-height: 150px;
      overflow-y: auto;
      border-top: 1px solid var(--border-color);
      background-color: var(--bg-color);
      font-family: monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
  </style>
</head>
<body>

  <div class="header">
    <div class="status-dot"></div>
    <h1>Web Agent Sidebar</h1>
  </div>

  <details class="logs-dropdown" open>
    <summary class="logs-summary">
      <div class="status-indicator"></div>
      <span id="logs-status-text">Ready</span>
      <span class="chevron">▼</span>
    </summary>
    <div class="logs-content" id="log-panel">
      </div>
  </details>

  <!-- Scrollable chat thread -->
  <div id="authContainer" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151;">
    <div id="userInfo" style="display: flex; align-items: center; gap: 8px;">
      <img id="userAvatar" style="width: 24px; height: 24px; border-radius: 50%; display: none;" />
      <span id="userName" style="font-size: 0.85rem; color: #e4e4e7;">Not signed in - REQUIRED TO RUN</span>
    </div>
    <button id="authButton" style="background: #4f74d9; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">Sign In</button>
  </div>
  <div class="chat-container" id="chatContainer">
    <div class="message system">Sidebar connected. Enter an objective below to begin.</div>
  </div>

  <!-- Bottom input section -->
  <div class="footer">
    <div class="input-row" style="align-items: flex-end;">
      <div style="position: relative; flex: 1; display: flex;">
        <textarea id="objectiveInput" placeholder="Ask the agent to do something..." style="width: 100%; height: 40px; min-height: 40px; max-height: 150px; overflow-y: hidden; transition: height 0.1s ease; padding-right: 40px; box-sizing: border-box;"></textarea>
        <button id="micButton" style="position: absolute; right: 4px; bottom: 4px; background: transparent; border: none; height: 32px; width: 32px; padding: 0; font-size: 1.1rem; cursor: pointer; z-index: 10;">🎙️</button>
      </div>
      <button id="startButton" style="height: 40px; line-height: 40px; padding: 0 16px;">➤</button>
      <button id="stop-btn" style="background-color: #4f74d9; color: rgb(255, 255, 255); height: 40px; line-height: 40px; width: 40px; padding: 0;">▢</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
